<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>TikTechno Events | Premium Event Planning & Wedding Services</title>
  <meta name="title" content="TikTechno Events | Premium Event Planning & Wedding Services" />
  <meta name="description"
    content="Transform your special occasions into unforgettable experiences. TikTechno specializes in weddings, corporate events, DJ parties, and cultural celebrations with stunning décor and personalized service." />
  <meta name="keywords"
    content="event planning, wedding planner, corporate events, DJ parties, cultural celebrations, event decoration, venue styling, wedding services" />
  <meta name="author" content="TikTechno Events" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tiktechno.com/" />
  <meta property="og:title" content="TikTechno Events | Premium Event Planning & Wedding Services" />
  <meta property="og:description"
    content="Transform your special occasions into unforgettable experiences. Expert planning for weddings, corporate events, and celebrations." />
  <meta property="og:image" content="/og-image.jpg" />
  <meta property="og:site_name" content="TikTechno Events" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://tiktechno.com/" />
  <meta name="twitter:title" content="TikTechno Events | Premium Event Planning & Wedding Services" />
  <meta name="twitter:description"
    content="Transform your special occasions into unforgettable experiences. Expert planning for weddings, corporate events, and celebrations." />
  <meta name="twitter:image" content="/og-image.jpg" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://tiktechno.com/" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#1a1625" />

  <!-- Preconnect to external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts for Invitation Editor -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Josefin+Sans:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:ital,wght@0,400;0,700;1,400&family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Raleway:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />


  <!-- Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EventPlanning",
      "name": "TikTechno Events",
      "description": "Premium event planning services for weddings, corporate events, DJ parties, and cultural celebrations",
      "url": "https://tiktechno.com",
      "serviceType": ["Wedding Planning", "Corporate Events", "DJ Parties", "Cultural Celebrations"],
      "areaServed": {
        "@type": "Country",
        "name": "Worldwide"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Event Planning Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Wedding Planning",
              "description": "Transform your special day into a fairytale with bespoke wedding planning services"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Corporate Events",
              "description": "Professional events that impress clients and inspire teams"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "DJ Parties",
              "description": "Energetic celebrations with top-tier sound systems and vibrant lighting"
            }
          }
        ]
      }
    }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
